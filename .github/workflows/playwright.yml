name: Playwright E2E Tests

# Triggers:
#   - Every push to main (so every deploy is gated by passing tests)
#   - Manual via "Run workflow" button on GitHub Actions tab
#   - Scheduled nightly at 02:00 UTC (catches drift / external API breakage)
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright tests against prod
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # URL + safety flag — testing against prod since staging isn't kept in sync.
      # ALLOW_PROD bypasses the safety guard in playwright.config.js.
      PLAYWRIGHT_BASE_URL: https://apply.daksfirst.com
      ALLOW_PROD: 'yes'
      # Credentials + test deal — pulled from GitHub Secrets (NOT in repo).
      TEST_BROKER_EMAIL: ${{ secrets.TEST_BROKER_EMAIL }}
      TEST_BROKER_PASSWORD: ${{ secrets.TEST_BROKER_PASSWORD }}
      TEST_DEAL_SUBMISSION_ID: ${{ secrets.TEST_DEAL_SUBMISSION_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        # Don't fail-fast on a single test — let all tests run and report all failures
        continue-on-error: false

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test-results (screenshots, videos) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
